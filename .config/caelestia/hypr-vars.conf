# XLLL CAELESTIA USER VARIABLES

$terminal = foot
$browser = firefox
$fileExplorer = thunar

# keep Caelestia-style binds
$kbTerminal = Super, T
$kbBrowser = Super, W
$kbCloseWindow = Super, Q

# XLLL mouse move/resize variables

# XLLL Hyprland 0.55 legacy mouse-binds workaround
# SUPER/ALT + mouse:272/273 is broken on some Hyprland 0.55 legacy configs.
# Hold SUPER+Z and move mouse = move window.
# Hold SUPER+X and move mouse = resize window.

# XLLL variables, real mouse handled by Lua/eval binds

# XLLL stable Hyprland 0.55 workaround
# Hold SUPER+Z and move mouse = move window
# Hold SUPER+X and move mouse = resize window

# XLLL exact mouse binds
$kbMoveWindow = Super, mouse:272
$kbResizeWindow = Super, mouse:273

